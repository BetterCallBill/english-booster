<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Booster — Flashcards</title>
<style>
  :root {
    --bg: #f4f5f7;
    --panel: #ffffff;
    --card-front: #ffffff;
    --card-back: #fbfcff;
    --text: #1c2433;
    --muted: #6b7385;
    --border: #e2e5ec;
    --accent: #4f6ef2;
    --accent-soft: #eaf0ff;
    --good: #1f9d57;
    --good-soft: #e6f6ec;
    --warn: #d98324;
    --warn-soft: #fcefe0;
    --shadow: 0 10px 30px rgba(28,36,51,.10);
    --tag-star: #e8a13a;
    --tag-chat: #4f8df2;
    --tag-book: #9b6bf2;
  }
  [data-theme="dark"] {
    --bg: #11141b;
    --panel: #1a1f29;
    --card-front: #1d2330;
    --card-back: #20283a;
    --text: #e7ebf3;
    --muted: #9aa3b5;
    --border: #2b3340;
    --accent: #6d86ff;
    --accent-soft: #232c44;
    --good: #46c980;
    --good-soft: #16301f;
    --warn: #e0a25a;
    --warn-soft: #34261a;
    --shadow: 0 12px 34px rgba(0,0,0,.45);
    --tag-star: #f0b454;
    --tag-chat: #6da3ff;
    --tag-book: #b08cff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 18px 16px 40px;
    transition: background .25s, color .25s;
  }
  .wrap { width: 100%; max-width: 760px; }
  header.top {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    margin-bottom: 14px;
  }
  .brand { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .brand h1 { font-size: 1.25rem; margin: 0; letter-spacing: -.2px; }
  .brand .sub { color: var(--muted); font-size: .82rem; }
  .icon-btn {
    border: 1px solid var(--border); background: var(--panel); color: var(--text);
    border-radius: 10px; padding: 8px 12px; cursor: pointer; font-size: .9rem;
    transition: background .15s, border-color .15s;
  }
  .icon-btn:hover { border-color: var(--accent); }

  .controls {
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 12px; display: grid; gap: 10px; margin-bottom: 16px;
    grid-template-columns: 1fr 1fr; box-shadow: var(--shadow);
  }
  .controls .row { display: flex; flex-direction: column; gap: 4px; }
  .controls label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  select {
    appearance: none; width: 100%; padding: 9px 10px; border-radius: 9px;
    border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: .9rem; cursor: pointer;
  }
  .controls .actions {
    grid-column: 1 / -1; display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .chk { display: flex; align-items: center; gap: 6px; font-size: .85rem; color: var(--muted); cursor: pointer; }
  .chk input { width: 16px; height: 16px; accent-color: var(--accent); }
  .spacer { flex: 1; }
  .ghost-btn {
    border: 1px solid var(--border); background: transparent; color: var(--muted);
    border-radius: 9px; padding: 8px 12px; cursor: pointer; font-size: .85rem;
  }
  .ghost-btn:hover { color: var(--text); border-color: var(--accent); }

  /* Card */
  .stage { perspective: 1600px; margin-bottom: 16px; }
  .card {
    position: relative; width: 100%; min-height: 340px;
    transform-style: preserve-3d; transition: transform .5s cubic-bezier(.4,.2,.2,1);
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .face {
    position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden;
    border: 1px solid var(--border); border-radius: 20px; box-shadow: var(--shadow);
    padding: 26px; display: flex; flex-direction: column; overflow: auto;
  }
  .front { background: var(--card-front); align-items: center; justify-content: center; text-align: center; gap: 14px; }
  .front .word { font-size: 2.1rem; font-weight: 700; letter-spacing: -.5px; line-height: 1.15; }
  .front .hint { color: var(--muted); font-size: .8rem; }
  .badge-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .cat-badge {
    font-size: .78rem; color: var(--muted); background: var(--accent-soft);
    border-radius: 999px; padding: 4px 11px; border: 1px solid var(--border);
  }
  .tag { font-size: 1rem; }

  .back { background: var(--card-back); transform: rotateY(180deg); gap: 2px; }
  .back .head { font-size: 1.45rem; font-weight: 700; margin-bottom: 10px; line-height: 1.2; }
  .back .head .pos { font-weight: 500; color: var(--muted); font-size: 1rem; font-style: italic; }
  .back .line { font-size: 1.02rem; line-height: 1.55; margin: 3px 0; }
  .back .label { font-weight: 600; color: var(--accent); }
  .back .zh { color: var(--text); opacity: .9; }
  .back .mine { margin-top: 4px; }
  .known-flag {
    align-self: flex-start; margin-top: auto; font-size: .76rem; padding: 3px 10px; border-radius: 999px;
  }
  .known-flag.known { background: var(--good-soft); color: var(--good); }
  .known-flag.learning { background: var(--warn-soft); color: var(--warn); }

  /* Controls under card */
  .nav { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 12px; }
  .nav button {
    border: 1px solid var(--border); background: var(--panel); color: var(--text);
    border-radius: 12px; padding: 12px 16px; cursor: pointer; font-size: .95rem; font-weight: 600;
    transition: transform .08s, border-color .15s;
  }
  .nav button:hover { border-color: var(--accent); }
  .nav button:active { transform: translateY(1px); }
  .nav .flip { background: var(--accent); color: #fff; border-color: var(--accent); flex: 1; max-width: 200px; }
  .nav .spk { font-size: 1.1rem; }

  .judge { display: flex; gap: 10px; justify-content: center; margin-bottom: 14px; }
  .judge button { flex: 1; max-width: 220px; border-radius: 12px; padding: 12px; cursor: pointer; font-weight: 600; font-size: .92rem; border: 1px solid var(--border); }
  .judge .know { background: var(--good-soft); color: var(--good); border-color: transparent; }
  .judge .learn { background: var(--warn-soft); color: var(--warn); border-color: transparent; }
  .judge button:hover { filter: brightness(1.04); }

  .status { display: flex; justify-content: space-between; align-items: center; color: var(--muted); font-size: .85rem; flex-wrap: wrap; gap: 8px; }
  .progress { height: 6px; background: var(--border); border-radius: 999px; overflow: hidden; margin-top: 10px; }
  .progress > span { display: block; height: 100%; background: var(--good); width: 0%; transition: width .3s; }
  .empty { text-align: center; color: var(--muted); padding: 60px 10px; }
  kbd { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 1px 6px; font-size: .78rem; }
  .legend { text-align: center; color: var(--muted); font-size: .78rem; margin-top: 14px; line-height: 1.7; }
  @media (max-width: 560px) {
    .front .word { font-size: 1.7rem; }
    .nav button { padding: 11px 13px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <h1>English Booster</h1>
      <span class="sub">Flashcards</span>
    </div>
    <button class="icon-btn" id="themeBtn" title="Toggle light/dark">🌙 Dark</button>
  </header>

  <section class="controls">
    <div class="row">
      <label for="catSel">Category</label>
      <select id="catSel"></select>
    </div>
    <div class="row">
      <label for="tagSel">Priority tag</label>
      <select id="tagSel">
        <option value="">All tags</option>
        <option value="⭐">⭐ High Frequency</option>
        <option value="💬">💬 Useful for Speaking</option>
        <option value="📚">📚 Advanced / Optional</option>
      </select>
    </div>
    <div class="actions">
      <label class="chk"><input type="checkbox" id="unknownChk"> Review unknown only</label>
      <span class="spacer"></span>
      <button class="ghost-btn" id="shuffleBtn">🔀 Shuffle</button>
      <button class="ghost-btn" id="resetBtn">↺ Reset progress</button>
    </div>
  </section>

  <div id="app">
    <div class="stage">
      <div class="card" id="card">
        <div class="face front" id="front"></div>
        <div class="face back" id="back"></div>
      </div>
    </div>

    <div class="nav">
      <button id="prevBtn">← Prev</button>
      <button class="flip" id="flipBtn">Flip</button>
      <button id="nextBtn">Next →</button>
      <button class="spk" id="speakBtn" title="Read aloud">🔊</button>
    </div>

    <div class="judge">
      <button class="learn" id="learnBtn">↻ Still learning</button>
      <button class="know" id="knowBtn">✓ I know this</button>
    </div>

    <div class="status">
      <span id="posLabel">0 / 0</span>
      <span id="knownLabel">0 known</span>
    </div>
    <div class="progress"><span id="progressBar"></span></div>
  </div>

  <div class="empty" id="emptyState" style="display:none">
    No cards match these filters. Try “All categories”, clear the tag, or turn off “Review unknown only”.
  </div>

  <div class="legend">
    <kbd>Space</kbd> flip · <kbd>←</kbd>/<kbd>→</kbd> prev/next · <kbd>S</kbd> shuffle · <kbd>K</kbd> know · <kbd>L</kbd> still learning
  </div>
</div>

<script>
const CARDS = [{"word":"Heads-up","tag":"⭐","pos":"n.","meaning":"an advance warning or notice","chinese":"提前通知，提醒","example":"Just a heads-up — the meeting got moved to 3pm.","mySentence":"Thanks for the heads-up about the traffic.","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"Get the ball rolling","tag":"⭐","pos":"idiom","meaning":"to start something, to initiate","chinese":"启动，开始推进","example":"Let's get the ball rolling on this project.","mySentence":"Who wants to get the ball rolling?","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"Hit the ground running","tag":"⭐","pos":"idiom","meaning":"to start with full energy and momentum from day one","chinese":"一开始就全力以赴","example":"She hit the ground running on her first day.","mySentence":"I want to hit the ground running next week.","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"Kick off","tag":"⭐","pos":"phrasal v.","meaning":"to start or begin an event or meeting","chinese":"开始，启动（活动、会议）","example":"Let's kick off the meeting.","mySentence":"The event kicks off at 7pm.","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"Call it off","tag":"⭐","pos":"phrasal v.","meaning":"to cancel a plan or event","chinese":"取消（计划）","example":"They called off the wedding.","mySentence":"We had to call it off because of the rain.","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"In one go","tag":"⭐","pos":"adv. phrase","meaning":"all at once, without stopping","chinese":"一次性，不停顿地完成","example":"I read the whole book in one go.","mySentence":"Can we finish this presentation in one go?","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"No-go","tag":"⭐","pos":"adj./n.","meaning":"not feasible or not allowed","chinese":"行不通，不可行","example":"The boss said that idea is a no-go.","mySentence":"Going out tonight is a no-go — I have deadlines.","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"Put down a deposit","tag":"⭐","pos":"phrase","meaning":"to pay an upfront partial payment to secure a booking","chinese":"付订金","example":"You need to put down a deposit to book the table.","mySentence":"I put down a deposit for the apartment.","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"Commute","tag":"⭐","pos":"v./n.","meaning":"to travel regularly between home and work","chinese":"通勤，上下班路途","example":"My daily commute takes over an hour.","mySentence":"The commute is the worst part of my day.","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"Déjà vu","tag":"⭐","pos":"n.","meaning":"the feeling of having already experienced the present moment","chinese":"似曾相识感，既视感","example":"Walking into that café gave me major déjà vu.","mySentence":"I had a weird sense of déjà vu when I met her.","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"Apparently","tag":"⭐","pos":"adv.","meaning":"reportedly; based on what others say or what seems evident","chinese":"据说，看来，显然","example":"Apparently the food here is amazing.","mySentence":"Apparently it's going to rain this weekend.","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"Practically","tag":"⭐","pos":"adv.","meaning":"almost, nearly; in nearly every way","chinese":"几乎，实际上","example":"I practically live on coffee.","mySentence":"The café was practically empty when I got there.","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"Instantly","tag":"⭐","pos":"adv.","meaning":"immediately, without any delay","chinese":"立刻，马上","example":"I instantly recognized her voice.","mySentence":"I instantly knew something was off.","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"Come across","tag":"⭐","pos":"phrasal v.","meaning":"① to encounter by chance ② to give a certain impression to others","chinese":"① 偶然遇到/发现 ② 给人某种感觉","example":"I came across an old photo. / She comes across as confident.","mySentence":"He comes across as really genuine.","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"Slip my mind","tag":"⭐","pos":"idiom","meaning":"to forget something, usually unintentionally","chinese":"忘记了","example":"Sorry, it completely slipped my mind.","mySentence":"Her birthday slipped my mind — I felt terrible.","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"Stumble on","tag":"⭐","pos":"phrasal v.","meaning":"to discover something unexpectedly","chinese":"偶然发现","example":"I stumbled on a great podcast yesterday.","mySentence":"I stumbled on this hidden café by accident.","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"Go over","tag":"⭐","pos":"phrasal v.","meaning":"to review or check something carefully","chinese":"复习，检查，过一遍","example":"Let's go over the plan one more time.","mySentence":"I need to go over my notes before the interview.","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"Tackle","tag":"⭐","pos":"v.","meaning":"to deal with or take on a problem head-on","chinese":"着手处理，应对","example":"Let's tackle this problem together.","mySentence":"I'll tackle the hardest task first thing in the morning.","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"Top-notch","tag":"⭐","pos":"adj.","meaning":"of the highest quality, excellent","chinese":"一流的，最高质量的","example":"Their service is genuinely top-notch.","mySentence":"The food quality is top-notch for that price.","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"Spot on","tag":"⭐","pos":"adj.","meaning":"completely accurate, exactly right","chinese":"完全正确，说得准","example":"Your analysis is spot on.","mySentence":"That's spot on — exactly what I was thinking.","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"Solid","tag":"⭐","pos":"adj.","meaning":"reliable, dependable, consistently good","chinese":"不错的，稳的，实在的","example":"That's a solid price for the quality.","mySentence":"It was a solid plan overall, nothing flashy.","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"It was a hit","tag":"⭐","pos":"idiom","meaning":"it was very popular or well-received","chinese":"大受欢迎","example":"The new dish was a hit with everyone.","mySentence":"Our last event was a total hit.","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"Collab","tag":"⭐","pos":"n./v.","meaning":"a collaboration or to collaborate (informal)","chinese":"合作（口语/网络用语）","example":"We're doing a collab with another creator.","mySentence":"Let's do a collab on this project.","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"Miserable","tag":"⭐","pos":"adj.","meaning":"extremely unhappy, uncomfortable, or unpleasant","chinese":"很惨，难受透了，凄凉","example":"The cold wind made our trip miserable.","mySentence":"A 3-hour commute every day is just miserable.","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"A breath of fresh air","tag":"⭐","pos":"idiom","meaning":"something refreshingly new and different","chinese":"耳目一新，令人振奋的变化","example":"Her energy is a total breath of fresh air.","mySentence":"Moving to a new city was a breath of fresh air for me.","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"Stale","tag":"⭐","pos":"adj.","meaning":"no longer fresh; repetitive and uninteresting","chinese":"不新鲜的；（比喻）过时的，老套的","example":"The bread went stale. / The conversation felt stale.","mySentence":"This routine is starting to feel stale — time to switch things up.","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"Roll with the plan","tag":"💬","pos":"phrase","meaning":"to go along with something without resistance","chinese":"顺着计划走，随机应变","example":"Let's just roll with the plan for now.","mySentence":"I'll roll with whatever you decide.","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"Scope out","tag":"💬","pos":"phrasal v.","meaning":"to investigate or check out a place or situation in advance","chinese":"提前踩点，去看看情况","example":"Let's scope out the new venue before the event.","mySentence":"I want to scope out the area first.","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"Debacle","tag":"💬","pos":"n.","meaning":"a complete and embarrassing failure or disaster","chinese":"彻底失败，一塌糊涂的局面","example":"The product launch turned into a total debacle.","mySentence":"That meeting was an absolute debacle.","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"Deceptively","tag":"📚","pos":"adv.","meaning":"in a misleadingly simple or easy-looking way","chinese":"看似…实则不然（容易误导人的）","example":"The task is deceptively simple — it gets hard fast.","mySentence":"This route looks deceptively short on the map.","category":"🗣️ Everyday Life & Small Talk","source":"vocab"},{"word":"Passionate about","tag":"⭐","pos":"adj.","meaning":"deeply enthusiastic or strongly caring about something","chinese":"对…充满热情","example":"I'm passionate about design and filmmaking.","mySentence":"I'm passionate about learning new languages.","category":"😊 Emotions & Feelings","source":"vocab"},{"word":"Absorbed in","tag":"⭐","pos":"adj.","meaning":"completely focused on, unable to think about anything else","chinese":"沉浸于，全神贯注","example":"She was completely absorbed in the book.","mySentence":"I get absorbed in music whenever I'm stressed.","category":"😊 Emotions & Feelings","source":"vocab"},{"word":"Make peace with it","tag":"⭐","pos":"idiom","meaning":"to emotionally accept something you cannot change","chinese":"释怀，接受现实","example":"I finally made peace with not getting that job.","mySentence":"You need to make peace with not being perfect.","category":"😊 Emotions & Feelings","source":"vocab"},{"word":"Ambiguous","tag":"⭐","pos":"adj.","meaning":"open to more than one meaning; unclear or vague","chinese":"模棱两可的，含糊不清的，暧昧的","example":"His reply was vague and ambiguous.","mySentence":"The instructions are too ambiguous to follow.","category":"😊 Emotions & Feelings","source":"vocab"},{"word":"Vague","tag":"⭐","pos":"adj.","meaning":"not clear or specific, lacking detail","chinese":"模糊的，不明确的","example":"His answer was too vague to understand.","mySentence":"Don't be vague — just say what you mean.","category":"😊 Emotions & Feelings","source":"vocab"},{"word":"Irrational","tag":"⭐","pos":"adj.","meaning":"not based on logic or reason","chinese":"不理智的，不合理的","example":"I know it's irrational, but I can't help it.","mySentence":"Fear of failure can be completely irrational.","category":"😊 Emotions & Feelings","source":"vocab"},{"word":"Introvert","tag":"⭐","pos":"n.","meaning":"a person who gains energy from solitude rather than social interaction","chinese":"内向的人","example":"I'm an introvert, but I can still enjoy parties sometimes.","mySentence":"Even introverts need meaningful connection.","category":"😊 Emotions & Feelings","source":"vocab"},{"word":"Traumatising","tag":"⭐","pos":"adj.","meaning":"causing lasting psychological harm or distress","chinese":"令人心理受创的，造成创伤的","example":"That experience was genuinely traumatising.","mySentence":"The breakup was more traumatising than I expected.","category":"😊 Emotions & Feelings","source":"vocab"},{"word":"Disgust","tag":"⭐","pos":"n./v.","meaning":"a strong feeling of dislike or revulsion; to cause that feeling","chinese":"厌恶，恶心，反感","example":"Cruelty disgusts me.","mySentence":"I can't hide my disgust sometimes — my face gives it away.","category":"😊 Emotions & Feelings","source":"vocab"},{"word":"Mysterious","tag":"⭐","pos":"adj.","meaning":"difficult to explain or understand; having an air of secrecy","chinese":"神秘的，难以捉摸的","example":"She has this mysterious vibe that draws people in.","mySentence":"He was mysterious at first but easy to talk to later.","category":"😊 Emotions & Feelings","source":"vocab"},{"word":"Stuck with","tag":"⭐","pos":"phrasal v.","meaning":"① forced to accept or deal with something ② lingering in your memory","chinese":"① 被迫接受某事 ② 某话/事一直留在心里","example":"Her words stuck with me for weeks.","mySentence":"I'm stuck with this old laptop for now, but it works.","category":"😊 Emotions & Feelings","source":"vocab"},{"word":"Skeptic / Skeptical","tag":"⭐","pos":"n./adj.","meaning":"a person who doubts; having a questioning or doubting attitude","chinese":"怀疑者；持怀疑态度的","example":"I was skeptical at first, but it actually works.","mySentence":"Even the biggest skeptics came around eventually.","category":"😊 Emotions & Feelings","source":"vocab"},{"word":"Zen about","tag":"💬","pos":"adj.","meaning":"calm, relaxed, and unbothered about something","chinese":"对…很淡定，保持平静","example":"He's surprisingly zen about failure.","mySentence":"I'm trying to stay zen about this whole situation.","category":"😊 Emotions & Feelings","source":"vocab"},{"word":"Soul crushing","tag":"💬","pos":"adj.","meaning":"extremely draining and demoralizing","chinese":"令人精神崩溃的，极度消耗人的","example":"Working there was honestly soul crushing.","mySentence":"A job with no meaning is soul crushing.","category":"😊 Emotions & Feelings","source":"vocab"},{"word":"Infatuated","tag":"💬","pos":"adj.","meaning":"intensely but briefly obsessed or attracted to someone","chinese":"痴迷的，一时上头地迷恋（短暂热烈的感情）","example":"He's totally infatuated with her right now.","mySentence":"I think I was just infatuated, not actually in love.","category":"😊 Emotions & Feelings","source":"vocab"},{"word":"Unassertive","tag":"💬","pos":"adj.","meaning":"not confident in expressing opinions or standing up for yourself","chinese":"不自信的，不善于表达自己的","example":"He's too unassertive in meetings — nobody hears him.","mySentence":"Being unassertive makes people walk all over you.","category":"😊 Emotions & Feelings","source":"vocab"},{"word":"Hard-hitting","tag":"💬","pos":"adj.","meaning":"having a powerful, direct, or shocking impact","chinese":"有冲击力的，震撼人心的","example":"That documentary was genuinely hard-hitting.","mySentence":"She gave a hard-hitting speech about mental health.","category":"😊 Emotions & Feelings","source":"vocab"},{"word":"Noteworthy","tag":"💬","pos":"adj.","meaning":"deserving attention or recognition, notable","chinese":"值得注意的，突出的","example":"Her progress this month is genuinely noteworthy.","mySentence":"That performance was noteworthy — everyone talked about it.","category":"😊 Emotions & Feelings","source":"vocab"},{"word":"Evocative","tag":"📚","pos":"adj.","meaning":"strongly bringing memories, feelings, or images to mind","chinese":"唤起情感/回忆的，引人遐想的","example":"The music was deeply evocative of childhood.","mySentence":"That smell is evocative of summer holidays.","category":"😊 Emotions & Feelings","source":"vocab"},{"word":"Camaraderie","tag":"📚","pos":"n.","meaning":"mutual trust, warmth, and friendship among a group","chinese":"友情，战友情，团队情谊","example":"Working on a hard project together builds real camaraderie.","mySentence":"I miss the camaraderie of being in a team.","category":"😊 Emotions & Feelings","source":"vocab"},{"word":"Demerit","tag":"📚","pos":"n.","meaning":"a disadvantage or fault; a negative mark against someone","chinese":"缺点，不足之处；扣分","example":"One major demerit of this plan is the cost.","mySentence":"Every option has its merits and demerits.","category":"😊 Emotions & Feelings","source":"vocab"},{"word":"Leverage","tag":"⭐","pos":"v./n.","meaning":"to use something strategically to gain an advantage","chinese":"利用（优势），发挥杠杆作用","example":"We should leverage AI tools to save time.","mySentence":"I want to leverage my network to land this role.","category":"💼 Work, Career & Tech","source":"vocab"},{"word":"Pivot","tag":"⭐","pos":"v./n.","meaning":"to change direction, strategy, or focus","chinese":"转型，调整方向，转向","example":"The startup pivoted to a completely different market.","mySentence":"We need to pivot quickly or we'll fall behind.","category":"💼 Work, Career & Tech","source":"vocab"},{"word":"Monetize","tag":"⭐","pos":"v.","meaning":"to earn money from something","chinese":"变现，将…商业化","example":"She monetized her YouTube channel through memberships.","mySentence":"How do you plan to monetize this app?","category":"💼 Work, Career & Tech","source":"vocab"},{"word":"Niche","tag":"⭐","pos":"n./adj.","meaning":"a specialized area of market or interest; targeted, specific","chinese":"小众领域；细分市场；小众的","example":"This is a niche hobby with a passionate community.","mySentence":"I want to find my niche in the market.","category":"💼 Work, Career & Tech","source":"vocab"},{"word":"Expand into","tag":"⭐","pos":"phrasal v.","meaning":"to grow into a new area, market, or field","chinese":"扩展到（新领域或市场）","example":"The company is expanding into Southeast Asia.","mySentence":"We're planning to expand into the European market next year.","category":"💼 Work, Career & Tech","source":"vocab"},{"word":"Competent","tag":"⭐","pos":"adj.","meaning":"having the skills and ability to do something well","chinese":"有能力的，胜任的","example":"She's a genuinely competent developer.","mySentence":"I want to be actually competent, not just look like it.","category":"💼 Work, Career & Tech","source":"vocab"},{"word":"Incompetent","tag":"⭐","pos":"adj.","meaning":"lacking the ability or skill to do something properly","chinese":"无能力的，不称职的","example":"The manager was completely incompetent.","mySentence":"It's frustrating working alongside someone incompetent.","category":"💼 Work, Career & Tech","source":"vocab"},{"word":"Commit to","tag":"⭐","pos":"phrasal v.","meaning":"to dedicate yourself fully to something","chinese":"全心投入，承诺，坚持","example":"You have to commit to your goals or nothing happens.","mySentence":"I committed to working out every morning this month.","category":"💼 Work, Career & Tech","source":"vocab"},{"word":"Work my way up","tag":"⭐","pos":"phrase","meaning":"to gradually advance to a higher position from the bottom","chinese":"一步步往上晋升，从底层做起","example":"He worked his way up from intern to senior manager.","mySentence":"I want to work my way up in the tech industry.","category":"💼 Work, Career & Tech","source":"vocab"},{"word":"Map out","tag":"⭐","pos":"phrasal v.","meaning":"to plan something carefully in detail","chinese":"规划，制定（计划/路线）","example":"Let's map out the next six months before we start.","mySentence":"I need to map out my career path properly.","category":"💼 Work, Career & Tech","source":"vocab"},{"word":"Caveat","tag":"⭐","pos":"n.","meaning":"an important warning or condition attached to something","chinese":"警告，注意事项，附带条件","example":"There's one big caveat — this only works in certain conditions.","mySentence":"There's a major caveat to this strategy we need to discuss.","category":"💼 Work, Career & Tech","source":"vocab"},{"word":"Decisive","tag":"⭐","pos":"adj.","meaning":"able to make decisions confidently and quickly","chinese":"果断的，干脆的","example":"Good leaders are decisive under pressure.","mySentence":"I'm working on being more decisive in daily decisions.","category":"💼 Work, Career & Tech","source":"vocab"},{"word":"Horizon","tag":"⭐","pos":"n.","meaning":"the future; the limit of what can be seen or imagined","chinese":"① 地平线 ② 未来的可能性，前景","example":"New opportunities are on the horizon.","mySentence":"I can see some exciting changes on the horizon.","category":"💼 Work, Career & Tech","source":"vocab"},{"word":"Step in","tag":"⭐","pos":"phrasal v.","meaning":"to intervene or get involved in a situation","chinese":"介入，插手，出手","example":"The manager stepped in to resolve the conflict.","mySentence":"Nobody stepped in when things started going wrong.","category":"💼 Work, Career & Tech","source":"vocab"},{"word":"Sponsorship","tag":"⭐","pos":"n.","meaning":"financial or material support from a company for a person or event","chinese":"赞助","example":"She landed a sponsorship deal with a fitness brand.","mySentence":"The event got sponsorship from three companies.","category":"💼 Work, Career & Tech","source":"vocab"},{"word":"Shoddy","tag":"💬","pos":"adj.","meaning":"poorly made or done; of low quality","chinese":"质量差的，粗制滥造的","example":"They sold shoddy products online and got bad reviews.","mySentence":"I returned it because the quality was shoddy.","category":"💼 Work, Career & Tech","source":"vocab"},{"word":"Don't rest on your laurels","tag":"💬","pos":"idiom","meaning":"don't become complacent or stop trying after achieving success","chinese":"不要躺在功劳簿上","example":"One good result doesn't mean you can rest on your laurels.","mySentence":"After the win, he just started resting on his laurels.","category":"💼 Work, Career & Tech","source":"vocab"},{"word":"Scrap the plan","tag":"💬","pos":"phrase","meaning":"to abandon a plan and start over","chinese":"放弃计划，推倒重来","example":"We had to scrap the original plan and start fresh.","mySentence":"Let's scrap the plan — it's not working.","category":"💼 Work, Career & Tech","source":"vocab"},{"word":"Stake / At stake","tag":"💬","pos":"n./phrase","meaning":"risk or interest; what could be lost or gained","chinese":"赌注，股份；岌岌可危（at stake）","example":"A lot is at stake in this negotiation.","mySentence":"He owns a small stake in the company.","category":"💼 Work, Career & Tech","source":"vocab"},{"word":"Flip the script","tag":"💬","pos":"idiom","meaning":"to completely reverse a situation or expectation","chinese":"彻底改变局面/预期","example":"AI completely flipped the script in the tech industry.","mySentence":"She flipped the script and became the one to watch.","category":"💼 Work, Career & Tech","source":"vocab"},{"word":"Classifier","tag":"💬","pos":"n.","meaning":"a model or system that assigns categories to input data","chinese":"分类器（机器学习）","example":"We trained an image classifier to detect spam.","mySentence":"The AI classifier got 94% accuracy on the test set.","category":"💼 Work, Career & Tech","source":"vocab"},{"word":"Latitude","tag":"💬","pos":"n.","meaning":"freedom to act or decide independently","chinese":"① 纬度 ② 自由度，灵活空间","example":"My boss gives me a lot of latitude at work.","mySentence":"I appreciate the latitude to work in my own way.","category":"💼 Work, Career & Tech","source":"vocab"},{"word":"Stamp your personality onto","tag":"💬","pos":"phrase","meaning":"to leave your personal mark or style on something","chinese":"将个人风格注入其中","example":"He really stamped his personality onto that project.","mySentence":"I want to stamp my personality onto everything I create.","category":"💼 Work, Career & Tech","source":"vocab"},{"word":"Proper ongoing gig","tag":"💬","pos":"phrase","meaning":"a legitimate, continuous job or project","chinese":"正经的、持续性的工作/项目","example":"I need a proper ongoing gig, not just one-off projects.","mySentence":"This collab turned into a proper ongoing gig — great timing.","category":"💼 Work, Career & Tech","source":"vocab"},{"word":"Banter","tag":"⭐","pos":"n./v.","meaning":"light, playful teasing or witty back-and-forth","chinese":"调侃，轻松幽默的互怼","example":"We were just having a bit of banter — no hard feelings.","mySentence":"I love friends who can banter without taking it personally.","category":"👥 Social & Relationships","source":"vocab"},{"word":"Fist bump","tag":"⭐","pos":"n./v.","meaning":"touching fists as a casual greeting or celebration","chinese":"碰拳（打招呼或庆祝）","example":"We did a fist bump after winning.","mySentence":"Give me a fist bump!","category":"👥 Social & Relationships","source":"vocab"},{"word":"Hook up","tag":"⭐","pos":"phrasal v.","meaning":"① to have a casual romantic/sexual encounter ② to connect devices","chinese":"① 约会/发生关系（口语）② 连接（设备）","example":"They hooked up after the party. / Hook up the monitor to the laptop.","mySentence":"We never hooked up — we're just close friends.","category":"👥 Social & Relationships","source":"vocab"},{"word":"Sucker for","tag":"⭐","pos":"phrase","meaning":"completely unable to resist something","chinese":"对…完全没抵抗力，特别容易被…吸引","example":"I'm a total sucker for good coffee.","mySentence":"I'm a sucker for a well-told story.","category":"👥 Social & Relationships","source":"vocab"},{"word":"Empathetic","tag":"⭐","pos":"adj.","meaning":"able to understand and share the feelings of others","chinese":"有同理心的","example":"She's a very empathetic listener — you always feel heard.","mySentence":"Being empathetic doesn't mean agreeing with everything.","category":"👥 Social & Relationships","source":"vocab"},{"word":"Compliment","tag":"⭐","pos":"n./v.","meaning":"an expression of praise or admiration; to praise someone","chinese":"赞美，夸奖","example":"She gave me a genuine compliment that made my day.","mySentence":"I love giving compliments when people deserve them.","category":"👥 Social & Relationships","source":"vocab"},{"word":"Piggyback","tag":"⭐","pos":"v./n.","meaning":"① to ride on someone's back ② to use or build on someone else's work","chinese":"① 骑在背上 ② 借力/搭便车（比喻）","example":"Can I piggyback on your idea and build on it?","mySentence":"Give me a piggyback ride!","category":"👥 Social & Relationships","source":"vocab"},{"word":"Affectionate roasting","tag":"💬","pos":"phrase","meaning":"teasing someone in a loving and playful way","chinese":"带有爱意的毒舌调侃（嘴很损但是是温情的）","example":"Our friend group is built on affectionate roasting.","mySentence":"It's affectionate roasting — he knows I love him.","category":"👥 Social & Relationships","source":"vocab"},{"word":"Keep a wall up","tag":"💬","pos":"phrase","meaning":"to stay emotionally guarded around others","chinese":"保持心理防线，不轻易敞开心扉","example":"He keeps a wall up around new people.","mySentence":"She finds it hard to stop keeping her wall up.","category":"👥 Social & Relationships","source":"vocab"},{"word":"Put you out","tag":"💬","pos":"phrasal v.","meaning":"to cause inconvenience or trouble for someone","chinese":"给你添麻烦，让你不方便","example":"I don't want to put you out by asking for a favour.","mySentence":"Sorry to put you out — I know it's a long drive.","category":"👥 Social & Relationships","source":"vocab"},{"word":"Beats the alternative","tag":"💬","pos":"phrase","meaning":"is better than the other option, even if it's not ideal","chinese":"总比另一个选择好（even if not ideal）","example":"Working late beats the alternative of losing the whole project.","mySentence":"Eating leftovers beats the alternative of cooking at midnight.","category":"👥 Social & Relationships","source":"vocab"},{"word":"My mind was made up","tag":"💬","pos":"phrase","meaning":"a decision had already been finalized, no changing it","chinese":"我已经决定了，心意已定","example":"My mind was made up before the meeting even started.","mySentence":"Once his mind is made up, there's no changing it.","category":"👥 Social & Relationships","source":"vocab"},{"word":"Spoil me","tag":"💬","pos":"v.","meaning":"to treat someone very generously or indulgently","chinese":"宠我，好好待我","example":"You really know how to spoil me.","mySentence":"He always spoils me on my birthday — flowers, dinner, the works.","category":"👥 Social & Relationships","source":"vocab"},{"word":"Rascal","tag":"💬","pos":"n.","meaning":"a mischievous or cheeky person (usually affectionate)","chinese":"淘气鬼，小坏蛋（通常是爱称）","example":"That kid is such a little rascal.","mySentence":"You rascal — I can't believe you did that!","category":"👥 Social & Relationships","source":"vocab"},{"word":"Lopsided","tag":"💬","pos":"adj.","meaning":"uneven, unbalanced, or unfairly weighted to one side","chinese":"不平衡的，偏向一方的","example":"The deal felt lopsided — one side did all the work.","mySentence":"Our friendship became a bit lopsided after a while.","category":"👥 Social & Relationships","source":"vocab"},{"word":"Chore wheel","tag":"💬","pos":"n.","meaning":"a rotating schedule for dividing household tasks fairly","chinese":"家务轮值表（分工系统）","example":"We set up a chore wheel so things stay fair between housemates.","mySentence":"The chore wheel was the best decision we made as a household.","category":"👥 Social & Relationships","source":"vocab"},{"word":"Fandom","tag":"💬","pos":"n.","meaning":"a community of enthusiastic fans around a shared interest","chinese":"粉丝圈，粉丝群体","example":"K-pop fandoms are massive worldwide.","mySentence":"The fandom went wild after the announcement.","category":"👥 Social & Relationships","source":"vocab"},{"word":"Food coma","tag":"⭐","pos":"n.","meaning":"the drowsy, sluggish feeling after eating a very large meal","chinese":"吃撑后昏昏欲睡的状态","example":"Sunday lunch always puts me in a food coma.","mySentence":"That hotpot left me in a full food coma for two hours.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Sugar cravings","tag":"⭐","pos":"n.","meaning":"a strong, hard-to-resist desire for sweet food","chinese":"对甜食的强烈渴望","example":"I'm having sugar cravings again after dinner.","mySentence":"Stress always gives me the worst sugar cravings.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Comfort food","tag":"⭐","pos":"n.","meaning":"food that makes you feel emotionally better or nostalgic","chinese":"治愈系美食，让人放松的食物","example":"Pasta is my comfort food after a hard day.","mySentence":"My comfort food is anything warm and carby.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Sweet treat","tag":"⭐","pos":"n.","meaning":"a small, sweet snack or dessert enjoyed as a reward","chinese":"甜食小零食，甜蜜犒劳","example":"I always buy a sweet treat on Fridays.","mySentence":"A sweet treat after a hard day hits different.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Whip up","tag":"⭐","pos":"phrasal v.","meaning":"to prepare food (or something else) quickly and easily","chinese":"快速做出（食物或方案）","example":"I can whip up some pasta in 20 minutes.","mySentence":"Let me whip up a quick prototype for you.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Cook up","tag":"⭐","pos":"phrasal v.","meaning":"① to cook food ② to invent or devise something","chinese":"① 做饭 ② 想出（主意）","example":"They cooked up a wild business idea over coffee.","mySentence":"I'll cook up something simple for dinner — nothing fancy.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Toss in","tag":"⭐","pos":"phrasal v.","meaning":"to casually add an ingredient or element","chinese":"随手加入（食材），随意加上","example":"Toss in some garlic and chili, then stir.","mySentence":"I tossed in a joke to lighten the mood.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Simmer","tag":"⭐","pos":"v.","meaning":"① to cook gently just below boiling ② to develop slowly beneath the surface","chinese":"① 小火慢炖 ② （情绪/紧张感）慢慢积累","example":"Let the soup simmer for 20 minutes. / Tension was simmering between them.","mySentence":"Let the resentment simmer long enough and it explodes.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Bland","tag":"⭐","pos":"adj.","meaning":"lacking strong flavor; dull or uninteresting","chinese":"没味道的，无聊的（食物或内容）","example":"The soup tastes bland — add more seasoning.","mySentence":"The food was bland but the vibe was great.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Scrape off","tag":"⭐","pos":"phrasal v.","meaning":"to remove something by scraping it with a tool","chinese":"刮掉，削去","example":"Just scrape the burnt part off the bread.","mySentence":"Scrape off the label before you recycle it.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Raw","tag":"⭐","pos":"adj.","meaning":"uncooked; unprocessed or in natural form","chinese":"生的，未熟透的","example":"I don't eat raw onions — too overpowering.","mySentence":"The chicken is still raw in the middle.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Mashed / Smash it up","tag":"⭐","pos":"adj./phrasal v.","meaning":"crushed into a soft paste; to crush something thoroughly","chinese":"捣碎的；捣碎它","example":"I love mashed potatoes with butter.","mySentence":"Smash the avocado up with a fork before spreading it.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Shelf life","tag":"⭐","pos":"n.","meaning":"how long a product stays fresh; how long something remains relevant","chinese":"保质期；（比喻）持续时间","example":"Check the shelf life before buying.","mySentence":"That trend doesn't have a long shelf life.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Mild","tag":"⭐","pos":"adj.","meaning":"not strong in flavor or spice; gentle and not intense","chinese":"温和的，不辣不刺激的","example":"This curry is pretty mild — perfect for me.","mySentence":"I prefer mild flavors in the morning.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Taste bud","tag":"⭐","pos":"n.","meaning":"a sensory receptor on the tongue that detects flavor","chinese":"味蕾","example":"Spicy food really wakes up your taste buds.","mySentence":"Travel always challenges your taste buds in the best way.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Cuisine","tag":"⭐","pos":"n.","meaning":"a style or tradition of cooking from a place or culture","chinese":"菜系，烹饪风格","example":"I love Japanese cuisine — the balance of flavors is incredible.","mySentence":"What's your favourite cuisine to cook at home?","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Staple","tag":"⭐","pos":"n./adj.","meaning":"a basic, essential food or item used regularly","chinese":"① 主食 ② 必备品，常用品","example":"Rice is a staple food across most of Asia.","mySentence":"Sneakers are a fashion staple for me.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Froyo","tag":"⭐","pos":"n.","meaning":"frozen yogurt (informal shortened form)","chinese":"冻酸奶（frozen yogurt缩写）","example":"Let's get froyo after dinner.","mySentence":"I'd rather have froyo than ice cream in summer.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Granola bar","tag":"⭐","pos":"n.","meaning":"a snack bar made from oats, nuts, and dried fruit","chinese":"燕麦能量棒","example":"I grab a granola bar when I'm running late.","mySentence":"Granola bars are my go-to hiking snack.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Sprinkle onto","tag":"⭐","pos":"phrasal v.","meaning":"to scatter small amounts of something over a surface","chinese":"撒在…上面","example":"Sprinkle cheese onto the pasta while it's hot.","mySentence":"I like to sprinkle sesame seeds onto everything.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Leftover","tag":"⭐","pos":"n./adj.","meaning":"food remaining from a previous meal; something that remains","chinese":"剩菜；剩余的","example":"I ate leftover pizza for breakfast — no regrets.","mySentence":"Leftover fried rice is honestly better than fresh.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Spice up","tag":"⭐","pos":"phrasal v.","meaning":"to add spice to food; to make something more exciting","chinese":"给…增添趣味/活力/辣味","example":"Add some chili to spice up the dish.","mySentence":"We need to spice up the presentation — it's too dry.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Switch things up","tag":"⭐","pos":"phrase","meaning":"to change your routine or try something new","chinese":"换换花样，改变一下常规","example":"Let's switch things up this weekend — try something new.","mySentence":"I switched things up and started cooking different cuisines.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Rubbery","tag":"💬","pos":"adj.","meaning":"tough and unpleasantly chewy, like rubber","chinese":"像橡皮一样难嚼的","example":"Overcooked squid turns rubbery and loses all the flavor.","mySentence":"The chicken was rubbery — clearly overcooked.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Charred look","tag":"💬","pos":"n.","meaning":"a blackened, burned appearance (often desirable in cooking)","chinese":"焦黑感，炭烤外观","example":"The steak had a perfect charred look on the outside.","mySentence":"I like a bit of a charred look on my toast.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Chewiness","tag":"💬","pos":"n.","meaning":"the quality of being pleasantly chewy or requiring effort to chew","chinese":"嚼劲，有嚼感","example":"The chewiness of fresh hand-pulled noodles is unbeatable.","mySentence":"The chewiness of mochi is what makes it so satisfying.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Cook out of","tag":"💬","pos":"phrasal v.","meaning":"to destroy nutrients or flavor by overcooking","chinese":"把（营养/味道）煮掉，煮没","example":"Boiling vegetables too long cooks out all the nutrients.","mySentence":"Don't cook all the flavor out of the meat.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Nutrient-packed","tag":"💬","pos":"adj.","meaning":"full of vitamins, minerals, and other healthy nutrients","chinese":"营养丰富的","example":"Eggs are one of the most nutrient-packed foods around.","mySentence":"This smoothie looks simple but it's nutrient-packed.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Oolong","tag":"💬","pos":"n.","meaning":"a semi-oxidized Chinese tea, between green and black tea in flavor","chinese":"乌龙茶","example":"I prefer oolong over green tea — more depth.","mySentence":"A good oolong is way underrated.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Creamy foam / Frother","tag":"💬","pos":"n.","meaning":"aerated milk foam; a device used to froth milk","chinese":"奶泡 / 打奶泡器","example":"The latte had perfect creamy foam on top. / I bought a milk frother.","mySentence":"A milk frother is genuinely worth buying if you love coffee.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Starvation","tag":"💬","pos":"n.","meaning":"extreme hunger or the state of being dangerously underfed","chinese":"饥饿，极度缺乏食物","example":"Skipping breakfast feels like near-starvation by lunchtime.","mySentence":"I'm not dieting, I'm on the edge of starvation.","category":"🍜 Food & Cooking","source":"vocab"},{"word":"Go on a hike","tag":"⭐","pos":"phrase","meaning":"to go for a long walk through nature or the countryside","chinese":"去徒步","example":"We went on a hike in the Blue Mountains last weekend.","mySentence":"I want to go on a hike before winter starts.","category":"🌏 Travel & Outdoors","source":"vocab"},{"word":"Roam","tag":"⭐","pos":"v.","meaning":"to wander freely without a fixed destination","chinese":"漫游，随意游荡","example":"We roamed around the city with no plan — the best way to explore.","mySentence":"I love to roam new cities completely alone.","category":"🌏 Travel & Outdoors","source":"vocab"},{"word":"Summit","tag":"⭐","pos":"n./v.","meaning":"the highest point of a mountain; to reach the top","chinese":"① 山顶 ② 峰会","example":"We finally reached the summit after four hours of hiking.","mySentence":"The view from the summit made every step worth it.","category":"🌏 Travel & Outdoors","source":"vocab"},{"word":"Downpour","tag":"⭐","pos":"n.","meaning":"a very heavy and sudden fall of rain","chinese":"倾盆大雨","example":"We got caught in a downpour with no umbrella.","mySentence":"The downpour ruined our outdoor plans.","category":"🌏 Travel & Outdoors","source":"vocab"},{"word":"It looks like rain","tag":"⭐","pos":"phrase","meaning":"it appears that rain is coming soon","chinese":"看起来要下雨了","example":"Bring an umbrella — it looks like rain.","mySentence":"It looks like rain, let's head home before it hits.","category":"🌏 Travel & Outdoors","source":"vocab"},{"word":"Exotic","tag":"⭐","pos":"adj.","meaning":"strikingly unusual or foreign; fascinating because it's from far away","chinese":"异域风情的，奇特有趣的","example":"Bali feels incredibly exotic to visitors from temperate climates.","mySentence":"Everything about that trip felt exotic and a little overwhelming.","category":"🌏 Travel & Outdoors","source":"vocab"},{"word":"Rain out","tag":"💬","pos":"phrasal v.","meaning":"to be cancelled or interrupted because of rain","chinese":"因下雨而取消","example":"The match got completely rained out.","mySentence":"Our barbecue got rained out, so we moved it inside.","category":"🌏 Travel & Outdoors","source":"vocab"},{"word":"At a premium","tag":"💬","pos":"adj. phrase","meaning":"rare and therefore more valuable or expensive than usual","chinese":"稀缺而珍贵，因稀少而价高","example":"Space is at a premium in Tokyo — apartments are tiny.","mySentence":"Time is at a premium before a product launch.","category":"🌏 Travel & Outdoors","source":"vocab"},{"word":"Bustling","tag":"💬","pos":"adj.","meaning":"full of lively activity, movement, and noise","chinese":"熙熙攘攘的，热闹繁忙的","example":"The market was absolutely bustling on Saturday morning.","mySentence":"I love exploring bustling night markets when I travel.","category":"🌏 Travel & Outdoors","source":"vocab"},{"word":"Free fall","tag":"💬","pos":"n.","meaning":"uncontrolled rapid descent; a sudden sharp decline in value or status","chinese":"① 自由落体 ② （比喻）急速下跌","example":"The stock market went into free fall after the news.","mySentence":"After the announcement, the company's reputation went into free fall.","category":"🌏 Travel & Outdoors","source":"vocab"},{"word":"Mental escape","tag":"💬","pos":"n.","meaning":"a way to mentally detach from stress and recharge","chinese":"精神上的逃离，让自己放松的出口","example":"Hiking is my mental escape from city life.","mySentence":"Music is my mental escape after a rough day.","category":"🌏 Travel & Outdoors","source":"vocab"},{"word":"Reckon","tag":"⭐","pos":"v.","meaning":"to think or believe (casual Australian/British English)","chinese":"认为，觉得（澳洲日常口语）","example":"I reckon we should leave early and beat the traffic.","mySentence":"I reckon this place is way better than the other one.","category":"🤙 Slang & Australian English","source":"vocab"},{"word":"Give it a crack","tag":"⭐","pos":"phrase","meaning":"to give something a try","chinese":"试一试，试试看","example":"I've never cooked Thai food before, but I'll give it a crack.","mySentence":"Just give it a crack — worst case it doesn't work out.","category":"🤙 Slang & Australian English","source":"vocab"},{"word":"Waddup","tag":"⭐","pos":"excl.","meaning":"\"what's up\" — a very casual and informal greeting","chinese":"最近怎样（\"what's up\"的口语版）","example":"Waddup bro? Haven't seen you in ages.","mySentence":"I just texted him \"waddup\" and waited.","category":"🤙 Slang & Australian English","source":"vocab"},{"word":"Bonkers","tag":"⭐","pos":"adj.","meaning":"completely crazy or absurd","chinese":"疯狂的，离谱的，夸张的","example":"That idea is absolutely bonkers — I love it.","mySentence":"The traffic this morning was completely bonkers.","category":"🤙 Slang & Australian English","source":"vocab"},{"word":"Piece of crap","tag":"⭐","pos":"phrase","meaning":"something that is terrible quality or completely useless (informal)","chinese":"垃圾东西（口语）","example":"This charger is a total piece of crap.","mySentence":"I returned it — absolute piece of crap.","category":"🤙 Slang & Australian English","source":"vocab"},{"word":"Whining about it","tag":"⭐","pos":"phrasal v.","meaning":"complaining about something repeatedly in an irritating way","chinese":"抱怨，发牢骚（让人烦的那种）","example":"Stop whining about it and actually fix the problem.","mySentence":"He kept whining about the food all night — exhausting.","category":"🤙 Slang & Australian English","source":"vocab"},{"word":"Slack off","tag":"⭐","pos":"phrasal v.","meaning":"to become lazy and stop working hard","chinese":"偷懒，摸鱼，松懈","example":"Don't slack off during the last stretch — you're almost there.","mySentence":"I definitely slacked off this week and I feel it.","category":"🤙 Slang & Australian English","source":"vocab"},{"word":"Hyping up","tag":"⭐","pos":"phrasal v.","meaning":"promoting something with great excitement and enthusiasm","chinese":"大肆吹捧，炒热，制造期待","example":"Everyone is hyping up this new restaurant downtown.","mySentence":"My friends have been hyping this movie up for weeks.","category":"🤙 Slang & Australian English","source":"vocab"},{"word":"Clutch","tag":"⭐","pos":"adj.","meaning":"performing well and reliably when it matters most","chinese":"关键时刻表现出色的；救场的","example":"That was such a clutch play right at the end.","mySentence":"He's always clutch when the pressure is on.","category":"🤙 Slang & Australian English","source":"vocab"},{"word":"Head in the clouds","tag":"⭐","pos":"idiom","meaning":"unrealistic, distracted, or lost in daydreams","chinese":"不切实际，活在幻想里","example":"He's brilliant, but he always has his head in the clouds.","mySentence":"Stop daydreaming and focus — head out of the clouds.","category":"🤙 Slang & Australian English","source":"vocab"},{"word":"Fair dinkum","tag":"💬","pos":"adj./excl.","meaning":"genuine, honest, or real (Australian slang)","chinese":"真的，正宗的，说真的（澳洲口语）","example":"Fair dinkum, that was the best meal I've had all year.","mySentence":"Is that fair dinkum? No way!","category":"🤙 Slang & Australian English","source":"vocab"},{"word":"Pull the pin","tag":"💬","pos":"phrase","meaning":"to stop, quit, or withdraw from something","chinese":"叫停，放弃，退出","example":"We pulled the pin on the project after three months.","mySentence":"He pulled the pin at the absolute last minute.","category":"🤙 Slang & Australian English","source":"vocab"},{"word":"Sussed out","tag":"💬","pos":"phrasal v.","meaning":"to have figured out or understood something (British/Australian slang)","chinese":"搞明白了，摸清楚了","example":"I finally sussed out what the issue was.","mySentence":"Have you sussed out where we're eating tonight?","category":"🤙 Slang & Australian English","source":"vocab"},{"word":"Feral","tag":"💬","pos":"adj.","meaning":"wild, untamed, or acting in an out-of-control way (Aussie slang)","chinese":"野的，行为邋遢/乱来的（澳洲俚语）","example":"That party got a bit feral toward the end of the night.","mySentence":"I haven't slept properly in days — I feel completely feral.","category":"🤙 Slang & Australian English","source":"vocab"},{"word":"Throw a bash","tag":"💬","pos":"phrase","meaning":"to host a party or celebration","chinese":"办派对，搞一个聚会","example":"Let's throw a bash this Saturday — invite everyone.","mySentence":"We're throwing a bash for her birthday next week.","category":"🤙 Slang & Australian English","source":"vocab"},{"word":"Small whoop","tag":"💬","pos":"phrase","meaning":"a minor issue, not a big deal","chinese":"小事一桩，没什么大不了","example":"Missing one session is a small whoop — don't stress about it.","mySentence":"It's honestly a small whoop, don't overthink it.","category":"🤙 Slang & Australian English","source":"vocab"},{"word":"Crusty","tag":"💬","pos":"adj.","meaning":"irritable or bad-tempered; having a hard, crusty outer texture","chinese":"脾气暴躁/态度粗鲁的（也指食物外壳酥脆）","example":"The old man at the counter was a bit crusty, but harmless.","mySentence":"He gets a bit crusty when he hasn't had his coffee.","category":"🤙 Slang & Australian English","source":"vocab"},{"word":"Ofc they dodged that","tag":"💬","pos":"phrase","meaning":"of course they avoided or side-stepped that (something uncomfortable)","chinese":"当然啦，他们逃过了/回避了那件事","example":"Ofc they dodged that hard question — classic move.","mySentence":"Ofc they dodged that awkward topic at dinner.","category":"🤙 Slang & Australian English","source":"vocab"},{"word":"Unpack","tag":"⭐","pos":"v.","meaning":"① to remove items from luggage ② to analyze or explain something in depth","chinese":"① 打开行李 ② 深入分析，展开讲解","example":"Let's unpack this idea before we commit to it.","mySentence":"I need time to unpack everything that happened today.","category":"🧠 Mind & Thinking","source":"vocab"},{"word":"Pop into your mind","tag":"⭐","pos":"phrase","meaning":"to suddenly think of something out of nowhere","chinese":"突然想到，冒出一个念头","example":"An idea popped into my mind while I was in the shower.","mySentence":"Her face just randomly popped into my mind.","category":"🧠 Mind & Thinking","source":"vocab"},{"word":"Jot down","tag":"⭐","pos":"phrasal v.","meaning":"to quickly write something down before you forget it","chinese":"快速记下来","example":"Jot down the main points before you forget.","mySentence":"I always jot down ideas the moment they hit me.","category":"🧠 Mind & Thinking","source":"vocab"},{"word":"Time melts away","tag":"💬","pos":"phrase","meaning":"time passes by without you noticing","chinese":"时间不知不觉流逝","example":"When I'm coding, time just melts away completely.","mySentence":"Time melts away whenever I'm in a good conversation.","category":"🧠 Mind & Thinking","source":"vocab"},{"word":"Golden nugget of (wisdom)","tag":"💬","pos":"phrase","meaning":"a small but extremely valuable piece of advice or insight","chinese":"宝贵的小精华（建议、洞见）","example":"That podcast had a real golden nugget of career advice.","mySentence":"I found a golden nugget of insight buried in that book.","category":"🧠 Mind & Thinking","source":"vocab"},{"word":"There's something bubbling away","tag":"💬","pos":"phrase","meaning":"something is quietly developing or building beneath the surface","chinese":"有什么东西在暗中酝酿","example":"There's something bubbling away in his mind — you can tell.","mySentence":"I can tell there's something bubbling away — she's holding back.","category":"🧠 Mind & Thinking","source":"vocab"},{"word":"Get rigid","tag":"💬","pos":"phrasal v.","meaning":"to become mentally or physically stiff and inflexible","chinese":"变得僵化，思维或身体变死板","example":"Don't get rigid in your thinking — stay open to new ideas.","mySentence":"I get rigid when I'm tired — mentally and physically.","category":"🧠 Mind & Thinking","source":"vocab"},{"word":"Let their bodies have a say","tag":"💬","pos":"phrase","meaning":"to move instinctively rather than overthinking every action","chinese":"让身体自己表达，顺从直觉","example":"Good dancers let their bodies have a say instead of overthinking.","mySentence":"Sometimes you need to stop analyzing and let your body have a say.","category":"🧠 Mind & Thinking","source":"vocab"},{"word":"Lock into","tag":"💬","pos":"phrasal v.","meaning":"to enter a state of deep focus or concentration","chinese":"专注进入状态，锁定","example":"I need to lock into work mode for the next two hours.","mySentence":"Once I lock into a rhythm, I'm unstoppable.","category":"🧠 Mind & Thinking","source":"vocab"},{"word":"Brain boosting","tag":"💬","pos":"adj.","meaning":"beneficial for brain function and mental performance","chinese":"有益大脑的，提升专注力的","example":"Exercise has real brain-boosting effects — not just a myth.","mySentence":"I want to build more brain-boosting habits into my routine.","category":"🧠 Mind & Thinking","source":"vocab"},{"word":"Vape","tag":"⭐","pos":"v./n.","meaning":"to inhale vapor from an e-cigarette or vaping device","chinese":"v./n. 抽电子烟","example":"You're not allowed to vape in public indoor spaces.","mySentence":"I've never vaped and I'm not planning to start.","category":"💪 Body & Health","source":"vocab"},{"word":"Stretch","tag":"⭐","pos":"v./n.","meaning":"to extend or lengthen muscles as a form of exercise","chinese":"拉伸，伸展（运动前后）","example":"Always stretch before and after you work out.","mySentence":"I stretch every morning now — total game changer.","category":"💪 Body & Health","source":"vocab"},{"word":"Better myself","tag":"⭐","pos":"v. phrase","meaning":"to actively work on improving yourself","chinese":"提升自己，让自己变得更好","example":"I read every day to better myself.","mySentence":"Everything I do right now is about bettering myself.","category":"💪 Body & Health","source":"vocab"},{"word":"Growth hormones","tag":"💬","pos":"n.","meaning":"hormones produced by the body that control growth and development","chinese":"生长激素","example":"Some athletes abuse growth hormones for performance.","mySentence":"Sleep is crucial for healthy growth hormone production.","category":"💪 Body & Health","source":"vocab"},{"word":"Tricep","tag":"💬","pos":"n.","meaning":"the muscle at the back of the upper arm","chinese":"肱三头肌","example":"My triceps are sore after that workout.","mySentence":"Push-ups are underrated for building triceps.","category":"💪 Body & Health","source":"vocab"},{"word":"Side sleeper","tag":"💬","pos":"n.","meaning":"a person who sleeps lying on their side","chinese":"侧睡的人","example":"Side sleepers need a firm, supportive pillow.","mySentence":"I'm a side sleeper, so shoulder pain is a constant problem.","category":"💪 Body & Health","source":"vocab"},{"word":"Soldier on","tag":"💬","pos":"phrasal v.","meaning":"to keep going despite difficulty, pain, or exhaustion","chinese":"咬牙坚持下去，不管多难都继续","example":"Even when completely exhausted, she just soldiered on.","mySentence":"You just have to soldier on sometimes — no other option.","category":"💪 Body & Health","source":"vocab"},{"word":"Slip into","tag":"⭐","pos":"phrasal v.","meaning":"to gradually and unnoticeably enter a state or habit","chinese":"悄悄滑入某个状态，不知不觉进入","example":"I slipped into a bad routine without even noticing.","mySentence":"It's easy to slip into a comfort zone and stop growing.","category":"🔄 Useful Phrasal Verbs & Expressions","source":"vocab"},{"word":"Fire up","tag":"⭐","pos":"phrasal v.","meaning":"① to start a machine or grill ② to excite and motivate someone","chinese":"① 启动（设备/烤架）② 激励，让人热血沸腾","example":"Let's fire up the grill. / His speech fired everyone up.","mySentence":"I need coffee to fire me up in the morning.","category":"🔄 Useful Phrasal Verbs & Expressions","source":"vocab"},{"word":"Cut out","tag":"⭐","pos":"phrasal v.","meaning":"to stop doing something; to remove or eliminate from your life","chinese":"戒掉，停止做（不好的事）","example":"I'm trying to cut out sugar this month.","mySentence":"I cut out social media for a week — felt amazing.","category":"🔄 Useful Phrasal Verbs & Expressions","source":"vocab"},{"word":"Incorporate into","tag":"⭐","pos":"phrasal v.","meaning":"to include something as part of a larger whole or routine","chinese":"把…融入…，整合进去","example":"She incorporated yoga into her morning routine.","mySentence":"I want to incorporate more reading into my daily life.","category":"🔄 Useful Phrasal Verbs & Expressions","source":"vocab"},{"word":"Pour heart into","tag":"⭐","pos":"phrase","meaning":"to give everything you have — emotionally and physically","chinese":"全心全意投入，全情付出","example":"She poured her heart into every detail of that project.","mySentence":"When I care about something, I pour my heart into it.","category":"🔄 Useful Phrasal Verbs & Expressions","source":"vocab"},{"word":"Go back in","tag":"⭐","pos":"phrase","meaning":"to return to a place after having left","chinese":"重新进去，折返回去","example":"I forgot my keys, so I had to go back in.","mySentence":"Don't go back in — just leave it, it's not worth it.","category":"🔄 Useful Phrasal Verbs & Expressions","source":"vocab"},{"word":"Crawl","tag":"⭐","pos":"v.","meaning":"to move on hands and knees; to move very slowly","chinese":"① 爬行 ② 缓慢移动（如塞车）","example":"Traffic crawled during rush hour — took me 90 minutes.","mySentence":"The queue crawled forward so slowly.","category":"🔄 Useful Phrasal Verbs & Expressions","source":"vocab"},{"word":"Walk by","tag":"⭐","pos":"phrasal v.","meaning":"to pass a place while walking","chinese":"路过，经过","example":"I walked by the café and the smell pulled me in.","mySentence":"She walked by without noticing me at all.","category":"🔄 Useful Phrasal Verbs & Expressions","source":"vocab"},{"word":"Grow up doing","tag":"⭐","pos":"phrase","meaning":"to have done something consistently throughout your childhood","chinese":"从小一直做某事（成长过程中）","example":"I grew up playing basketball every afternoon.","mySentence":"She grew up speaking two languages at home.","category":"🔄 Useful Phrasal Verbs & Expressions","source":"vocab"},{"word":"Organic","tag":"⭐","pos":"adj.","meaning":"naturally occurring and unforced; not artificial or planned","chinese":"① 有机的 ② 自然形成的，不刻意的","example":"Their friendship felt completely organic — it just happened.","mySentence":"The best conversations are organic — no agenda.","category":"🔄 Useful Phrasal Verbs & Expressions","source":"vocab"},{"word":"Ramble on","tag":"💬","pos":"phrasal v.","meaning":"to talk for a long time without clear direction or focus","chinese":"喋喋不休，说个没完没有重点","example":"Sorry, I'm rambling on again — where was I?","mySentence":"He rambled on about crypto for 20 minutes straight.","category":"🔄 Useful Phrasal Verbs & Expressions","source":"vocab"},{"word":"Bounce (early)","tag":"💬","pos":"v.","meaning":"to leave a place early (casual and informal)","chinese":"提前离开（口语，从某地离开）","example":"He bounced from the party early — said he was tired.","mySentence":"I bounced around 11 — it was getting late.","category":"🔄 Useful Phrasal Verbs & Expressions","source":"vocab"},{"word":"Rise off","tag":"💬","pos":"phrasal v.","meaning":"to rise upward from a surface (steam, mist, heat)","chinese":"从…上升起（蒸汽、热气）","example":"Steam rose off the bowl of soup.","mySentence":"I love watching mist rise off the water in the morning.","category":"🔄 Useful Phrasal Verbs & Expressions","source":"vocab"},{"word":"Parade around","tag":"💬","pos":"phrasal v.","meaning":"to walk around in a proud or showy way to attract attention","chinese":"得意洋洋地走来走去，炫耀","example":"He paraded around proudly after winning the award.","mySentence":"Don't just parade around — show some humility.","category":"🔄 Useful Phrasal Verbs & Expressions","source":"vocab"},{"word":"Of your own brilliance","tag":"💬","pos":"phrase","meaning":"your own unique talent and originality","chinese":"属于你自己独特的才华和闪光点","example":"Trust the work — it shows the stamp of your own brilliance.","mySentence":"Your success comes from your own brilliance — own it.","category":"🔄 Useful Phrasal Verbs & Expressions","source":"vocab"},{"word":"Step over a dollar to pick up a dime","tag":"📚","pos":"idiom","meaning":"to sacrifice something big for something small; penny-wise and pound-foolish","chinese":"捡了芝麻丢了西瓜，贪小便宜吃大亏","example":"Don't step over a dollar to pick up a dime — think bigger.","mySentence":"He wasted time on a cheap deal and lost a major client.","category":"🔄 Useful Phrasal Verbs & Expressions","source":"vocab"},{"word":"Follow (something) through","tag":"","pos":"","meaning":"To continue doing something until it is completed successfully.","chinese":"坚持到底，把事情做完；贯彻执行。","example":"I started the project and followed it through to completion.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"lung","tag":"","pos":"","meaning":"The main organ in the body used for breathing.","chinese":"n. 肺；肺部","example":"Smoking does great harm to your lungs.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"intifada","tag":"","pos":"","meaning":"A grassroots uprising and resistance movement against occupation.","chinese":"n. 起义；反抗运动（特指巴勒斯坦反抗运动）","example":"The intifada drew global attention years ago.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"uprising","tag":"","pos":"","meaning":"An act of ordinary people rising up to fight against authority.","chinese":"n. 起义；暴动","example":"The local people launched a peaceful uprising.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"rebellion","tag":"","pos":"","meaning":"Open resistance against a government, ruler or rules.","chinese":"n. 叛乱；反抗；叛逆","example":"The rebellion was finally put down peacefully.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"shaking off oppression","tag":"","pos":"","meaning":"Getting rid of unfair control and exploitation from others.","chinese":"摆脱压迫；挣脱桎梏","example":"They fought hard for shaking off oppression.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"I’m having sugar cravings again.","tag":"","pos":"","meaning":"I feel a strong desire to eat sweet food again.","chinese":"我又嘴馋想吃甜食了。","example":"I’m having sugar cravings again at midnight.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"Pasta is my comfort food.","tag":"","pos":"","meaning":"Pasta is the food that makes me feel relaxed and happy when upset.","chinese":"意大利面是我的慰藉美食/治愈美食。","example":"For many people, noodles are their comfort food.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"definite","tag":"","pos":"adj.","meaning":"clear and certain","chinese":"明确的，肯定的","example":"We need a definite plan before Friday.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"firmly","tag":"","pos":"adv.","meaning":"in a strong or determined way","chinese":"坚定地；牢固地","example":"He firmly believed in himself.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"Shark Tank","tag":"","pos":"proper noun","meaning":"a TV show where entrepreneurs pitch business ideas to investors","chinese":"《创智赢家》","example":"I watched Shark Tank last night.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"laurels","tag":"","pos":"n. plural","meaning":"praise or honor earned from success","chinese":"荣誉；成就","example":"Don’t rest on your laurels.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"vaguely","tag":"","pos":"adv.","meaning":"in an unclear way","chinese":"模糊地；隐约地","example":"I vaguely remember his face.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"bounced","tag":"","pos":"v.","meaning":"moved quickly away or rebounded","chinese":"弹回；离开","example":"The ball bounced off the wall.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"previs","tag":"","pos":"n.","meaning":"early visual planning used in filmmaking and VFX","chinese":"预演动画；预可视化","example":"The director reviewed the previs before shooting.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"rehearsal","tag":"","pos":"n.","meaning":"practice before a performance or event","chinese":"排练","example":"The band had rehearsal all night.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"stamp … onto","tag":"","pos":"verb phrase","meaning":"to press or place something firmly onto another thing","chinese":"印上；强加于","example":"The company stamped its logo onto the box.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"labeling","tag":"","pos":"n. / v.","meaning":"assigning categories or names to people or things","chinese":"贴标签；标签化","example":"Labeling people can be harmful.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"we better do …","tag":"","pos":"expression","meaning":"used to strongly suggest doing something","chinese":"我们最好……","example":"We better leave now.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"hipster friend","tag":"","pos":"noun phrase","meaning":"a trendy or alternative-style friend","chinese":"文艺潮人朋友","example":"My hipster friend drinks expensive coffee.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"those","tag":"","pos":"pron.","meaning":"plural form referring to things far away or already mentioned","chinese":"那些","example":"Those shoes look expensive.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"rub … on","tag":"","pos":"phrasal verb","meaning":"to spread something onto a surface or body","chinese":"涂抹","example":"Rub sunscreen on your face.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"pubes","tag":"","pos":"slang noun","meaning":"informal word for pubic hair","chinese":"阴毛","example":"Teenagers start growing pubes during puberty.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"a pet peeve","tag":"","pos":"noun phrase","meaning":"something that annoys you a lot personally","chinese":"特别讨厌的小事","example":"Loud chewing is my pet peeve.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"pale color","tag":"","pos":"noun phrase","meaning":"a light or weak color","chinese":"浅色；苍白的颜色","example":"She painted the room a pale color.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"nutrients","tag":"","pos":"n. plural","meaning":"substances that help living things grow and stay healthy","chinese":"营养物质","example":"Vegetables contain important nutrients.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"burnt","tag":"","pos":"adj.","meaning":"damaged by too much heat","chinese":"烧焦的","example":"The toast is burnt.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"chew","tag":"","pos":"v.","meaning":"to crush food with your teeth","chinese":"咀嚼","example":"Chew your food slowly.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"pretzel","tag":"","pos":"n.","meaning":"a twisted baked snack, often salty","chinese":"椒盐卷饼","example":"I bought a giant pretzel at the festival.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"broader than","tag":"","pos":"adj. phrase","meaning":"wider or more general than something else","chinese":"比……更广泛","example":"His interests are broader than mine.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"be used to","tag":"","pos":"phrase","meaning":"to be familiar with something because of experience","chinese":"习惯于","example":"I’m used to waking up early.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"apricots","tag":"","pos":"n. plural","meaning":"small soft orange fruits","chinese":"杏子","example":"Dried apricots are sweet.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"plantains","tag":"","pos":"n. plural","meaning":"a type of banana usually cooked before eating","chinese":"大蕉","example":"Fried plantains are delicious.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"cranberries","tag":"","pos":"n. plural","meaning":"small red berries often used in juice or dried snacks","chinese":"蔓越莓","example":"Cranberries are slightly sour.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"last a long time","tag":"","pos":"verb phrase","meaning":"to remain usable for a long period","chinese":"持续很久","example":"These batteries last a long time.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"mashed","tag":"","pos":"adj.","meaning":"crushed into a soft mixture","chinese":"捣碎的","example":"I like mashed potatoes.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"smash it up","tag":"","pos":"phrasal verb","meaning":"to break or crush something forcefully","chinese":"砸碎；捣碎","example":"Smash the avocado up with a fork.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"Canto pop songs","tag":"","pos":"noun phrase","meaning":"Cantonese-language pop music","chinese":"粤语流行歌曲","example":"My parents love old Canto pop songs.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"crop","tag":"","pos":"n. / v.","meaning":"plants grown for food OR to cut part of something","chinese":"农作物；裁剪","example":"Farmers lost their crops in the storm.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"mother tongue","tag":"","pos":"n.","meaning":"the first language someone learns","chinese":"母语","example":"Mandarin is my mother tongue.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"ramen","tag":"","pos":"n.","meaning":"Japanese noodle soup dish","chinese":"拉面（日式）","example":"We had ramen for dinner.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"unheard","tag":"","pos":"adj.","meaning":"never known or experienced before","chinese":"前所未闻的","example":"Prices this high were unheard of before.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"survival norm","tag":"","pos":"noun phrase","meaning":"common behaviors needed for survival","chinese":"生存法则","example":"Competition became a survival norm.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"bravery gene","tag":"","pos":"noun phrase","meaning":"imagined natural tendency toward bravery","chinese":"勇敢基因","example":"He seems to have a bravery gene.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"puppet show","tag":"","pos":"n.","meaning":"performance using puppets","chinese":"木偶戏","example":"Kids enjoyed the puppet show.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"hanging ten","tag":"","pos":"surfing slang","meaning":"surfing move with toes over the board edge","chinese":"冲浪时十趾挂板头","example":"He was hanging ten perfectly.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"bride","tag":"","pos":"n.","meaning":"a woman getting married","chinese":"新娘","example":"The bride looked beautiful.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"hull","tag":"","pos":"n.","meaning":"main body of a ship or boat","chinese":"船身外壳","example":"The ship’s hull was damaged.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"stake","tag":"","pos":"n. / v.","meaning":"something at risk or ownership in something","chinese":"赌注；股份；押上","example":"He owns a stake in the company.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"pour her heart into doing","tag":"","pos":"expression","meaning":"to do something with full passion and effort","chinese":"全心投入做某事","example":"She poured her heart into the project.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"parade","tag":"","pos":"n. / v.","meaning":"public procession or showing off","chinese":"游行；展示","example":"We watched the parade downtown.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"line up","tag":"","pos":"phrasal verb","meaning":"to form a line","chinese":"排队；排列","example":"People lined up for coffee.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"knock up","tag":"","pos":"phrasal verb, informal","meaning":"quickly make something OR impregnate someone (slang)","chinese":"快速做出；（俚语）让人怀孕","example":"I can knock up a quick design.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"midweek","tag":"","pos":"n. / adj.","meaning":"middle of the week","chinese":"周中","example":"I’m busy midweek.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"quest","tag":"","pos":"n.","meaning":"a long search for something meaningful","chinese":"探索；追求","example":"Learning English feels like a quest.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"tastiest","tag":"","pos":"adj. superlative","meaning":"most delicious","chinese":"最好吃的","example":"This is the tastiest ramen I’ve had.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"a sip of genius","tag":"","pos":"expression","meaning":"something t
