astes extremely clever or impressive","chinese":"天才般的一口（夸张说法）","example":"This coffee is a sip of genius.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"crown","tag":"","pos":"n. / v.","meaning":"royal headwear or to declare as the best","chinese":"皇冠；加冕","example":"The king wore a golden crown.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"clinking","tag":"","pos":"v. / adj.","meaning":"making light ringing sounds when objects hit each other","chinese":"叮当碰撞声","example":"Glasses were clinking at the party.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"tropical twist","tag":"","pos":"noun phrase","meaning":"a tropical-style variation","chinese":"热带风味变化","example":"The drink has a tropical twist.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"seasonal experiment","tag":"","pos":"noun phrase","meaning":"trying something new for a season","chinese":"季节限定尝试","example":"The cafe launched a seasonal experiment.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"creamy foam","tag":"","pos":"noun phrase","meaning":"soft creamy bubbles on drinks","chinese":"奶泡","example":"The latte had creamy foam on top.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"frother","tag":"","pos":"n.","meaning":"a tool for making milk foam","chinese":"打奶泡器","example":"I bought a milk frother.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"rice revelation","tag":"","pos":"noun phrase","meaning":"a surprising discovery about rice","chinese":"关于米饭的惊喜发现","example":"Fried rice was a rice revelation for him.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"genre of","tag":"","pos":"noun phrase","meaning":"category or style of art/music/movies","chinese":"……类型","example":"Horror is my favorite genre of movie.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"plot","tag":"","pos":"n.","meaning":"the main story of a movie or book","chinese":"剧情；情节","example":"The plot was confusing.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"admire","tag":"","pos":"v.","meaning":"to respect or like someone/something deeply","chinese":"欣赏；钦佩","example":"I admire her discipline.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"Michelin","tag":"","pos":"adj. / proper noun","meaning":"related to Michelin restaurant ratings","chinese":"米其林","example":"That’s a Michelin restaurant.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"chef","tag":"","pos":"n.","meaning":"a professional cook","chinese":"主厨","example":"The chef prepared an amazing meal.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"crack","tag":"","pos":"v. / n.","meaning":"to break or solve something difficult","chinese":"破解；裂缝","example":"They cracked the code.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"skeptic","tag":"","pos":"n.","meaning":"someone who doubts things easily","chinese":"怀疑者","example":"I was skeptical at first.","mySentence":"","category":"📓 Word Notes","source":"word"},{"word":"golden nugget of …","tag":"","pos":"phrase","meaning":"a small but valuable piece of information","chinese":"宝贵的小精华","example":"That podcast had a golden nugget of advice.","mySentence":"","category":"📓 Word Notes","source":"word"}];

const $ = id => document.getElementById(id);
const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

const LS_PROGRESS = 'eb_progress_v1';
const LS_THEME = 'eb_theme_v1';

let progress = loadProgress();
let deck = [];
let idx = 0;
let flipped = false;

function loadProgress() {
  try { return JSON.parse(localStorage.getItem(LS_PROGRESS)) || {}; } catch { return {}; }
}
function saveProgress() { localStorage.setItem(LS_PROGRESS, JSON.stringify(progress)); }
const keyOf = c => c.word.toLowerCase().trim();

/* ---------- Theme ---------- */
function applyTheme(t) {
  document.body.setAttribute('data-theme', t);
  $('themeBtn').textContent = t === 'dark' ? '☀️ Light' : '🌙 Dark';
}
(function initTheme() {
  let t = localStorage.getItem(LS_THEME);
  if (!t) t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  applyTheme(t);
})();
$('themeBtn').onclick = () => {
  const t = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  localStorage.setItem(LS_THEME, t); applyTheme(t);
};

/* ---------- Categories ---------- */
(function fillCategories() {
  const cats = [];
  for (const c of CARDS) if (!cats.includes(c.category)) cats.push(c.category);
  const sel = $('catSel');
  sel.innerHTML = '<option value="">All categories (' + CARDS.length + ')</option>';
  for (const cat of cats) {
    const n = CARDS.filter(c => c.category === cat).length;
    const o = document.createElement('option');
    o.value = cat; o.textContent = cat + ' (' + n + ')';
    sel.appendChild(o);
  }
})();

/* ---------- Deck building ---------- */
function buildDeck() {
  const cat = $('catSel').value;
  const tag = $('tagSel').value;
  const unknownOnly = $('unknownChk').checked;
  deck = CARDS.filter(c => {
    if (cat && c.category !== cat) return false;
    if (tag && c.tag !== tag) return false;
    if (unknownOnly && progress[keyOf(c)] === 'known') return false;
    return true;
  });
  idx = 0; flipped = false;
  render();
}

function shuffle() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0; flipped = false; render();
}

/* ---------- Render ---------- */
function render() {
  const has = deck.length > 0;
  $('app').style.display = has ? '' : 'none';
  $('emptyState').style.display = has ? 'none' : '';
  if (!has) return;

  if (idx < 0) idx = deck.length - 1;
  if (idx >= deck.length) idx = 0;
  const c = deck[idx];

  $('card').classList.toggle('flipped', flipped);

  // Front
  $('front').innerHTML =
    '<div class="badge-row">' +
      '<span class="cat-badge">' + esc(c.category) + '</span>' +
      (c.tag ? '<span class="tag">' + c.tag + '</span>' : '') +
    '</div>' +
    '<div class="word">' + esc(c.word) + '</div>' +
    '<div class="hint">tap or press Space to flip</div>';

  // Back — faithful to vocab_system format
  const state = progress[keyOf(c)];
  let html = '<div class="head">' + esc(c.word) +
    (c.tag ? ' <span class="tag">' + c.tag + '</span>' : '') +
    (c.pos ? ' <span class="pos">' + esc(c.pos) + '</span>' : '') + '</div>';
  if (c.meaning) html += '<div class="line"><span class="label">Meaning:</span> ' + esc(c.meaning) + '</div>';
  if (c.chinese) html += '<div class="line zh">' + esc(c.chinese) + '</div>';
  if (c.example) html += '<div class="line"><span class="label">Example:</span> ' + esc(c.example) + '</div>';
  if (c.mySentence) html += '<div class="line mine"><span class="label">My sentence:</span> ' + esc(c.mySentence) + '</div>';
  if (state) html += '<div class="known-flag ' + state + '">' + (state === 'known' ? '✓ Known' : '↻ Still learning') + '</div>';
  $('back').innerHTML = html;

  $('posLabel').textContent = (idx + 1) + ' / ' + deck.length;
  const knownCount = CARDS.filter(c => progress[keyOf(c)] === 'known').length;
  $('knownLabel').textContent = knownCount + ' of ' + CARDS.length + ' known';
  $('progressBar').style.width = (CARDS.length ? (knownCount / CARDS.length * 100) : 0) + '%';
}

function flip() { flipped = !flipped; $('card').classList.toggle('flipped', flipped); }
function next() { idx++; flipped = false; render(); }
function prev() { idx--; flipped = false; render(); }

function judge(state) {
  if (!deck.length) return;
  progress[keyOf(deck[idx])] = state;
  saveProgress();
  if ($('unknownChk').checked && state === 'known') { buildDeck(); }
  else next();
}

/* ---------- Speech ---------- */
function speak() {
  if (!deck.length || !('speechSynthesis' in window)) return;
  const c = deck[idx];
  const u = new SpeechSynthesisUtterance(c.word + (c.example ? '. ' + c.example : ''));
  u.lang = 'en-US'; u.rate = 0.95;
  const v = speechSynthesis.getVoices().find(v => /en[-_]/i.test(v.lang));
  if (v) u.voice = v;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

/* ---------- Wiring ---------- */
$('card').onclick = flip;
$('flipBtn').onclick = e => { e.stopPropagation(); flip(); };
$('nextBtn').onclick = next;
$('prevBtn').onclick = prev;
$('speakBtn').onclick = speak;
$('knowBtn').onclick = () => judge('known');
$('learnBtn').onclick = () => judge('learning');
$('shuffleBtn').onclick = shuffle;
$('catSel').onchange = buildDeck;
$('tagSel').onchange = buildDeck;
$('unknownChk').onchange = buildDeck;
$('resetBtn').onclick = () => {
  if (confirm('Reset all Know / Still-learning progress?')) { progress = {}; saveProgress(); buildDeck(); }
};

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'SELECT') return;
  const k = e.key.toLowerCase();
  if (e.code === 'Space') { e.preventDefault(); flip(); }
  else if (e.key === 'ArrowRight') next();
  else if (e.key === 'ArrowLeft') prev();
  else if (k === 's') shuffle();
  else if (k === 'k') judge('known');
  else if (k === 'l') judge('learning');
});

if ('speechSynthesis' in window) speechSynthesis.onvoiceschanged = () => {};
buildDeck();
</script>
